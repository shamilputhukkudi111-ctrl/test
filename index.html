        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 30px; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); 
            position: absolute; width: 100%; z-index: 1000;
        }
        .logo-container { font-family: 'Fredoka', sans-serif; font-weight: 700; font-size: 1.1rem; letter-spacing: 1px; cursor: pointer; }
        .logo-kerala { color: #43bdec; }
        .logo-sahityotsav { color: var(--brand-yellow); margin-left: 5px; }

        .page { display: none; min-height: 100vh; position: relative; }
        .active-page { display: block; }

        .hero {
            height: 100vh; display: flex; flex-direction: column; align-items: center;
            justify-content: center; text-align: center;
            padding: 20px;
        }
        .kerala-label { 
            font-family: 'Montserrat', sans-serif; 
            font-size: 1.1rem; 
            color: var(--brand-yellow); 
            letter-spacing: 4px; 
            margin-bottom: 10px; 
            text-transform: uppercase; 
            font-weight: 700;
        }

        .sahityotsav-title { 
            font-family: 'Montserrat', sans-serif; 
            font-size: 4rem; 
            color: #43bdec;
            text-transform: uppercase; 
            line-height: 1.1; 
            margin-bottom: 40px;
            font-weight: 900;
            letter-spacing: -1px;
            position: relative;
            text-shadow: 0 1px 0 var(--brand-yellow), 0 2px 0 var(--brand-yellow), 0 6px 1px rgba(0,0,0,.5), 0 10px 20px rgba(0,0,0,.8);
            animation: floating 4s ease-in-out infinite;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0) rotateX(5deg); }
            50% { transform: translateY(-15px) rotateX(10deg); }
        }
        
        @media (max-width: 600px) {
            .sahityotsav-title { font-size: 2.3rem; }
            .kerala-label { font-size: 0.9rem; }
        }

        .btn-3d {
            padding: 18px 50px; font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 0.9rem;
            border-radius: 25px; cursor: pointer; border: none; text-transform: uppercase;
            transition: all 0.1s ease; margin-bottom: 15px; width: 280px;
            position: relative;
        }
        .btn-attendance { background-color: var(--brand-blue); color: #fff; box-shadow: 0px 8px 0px var(--brand-yellow); }
        .btn-3d:active { transform: translateY(4px); box-shadow: 0px 4px 0px #0fa6f1; }

        #attendancePage { padding: 100px 20px; }
        #venueSelectionView { display: block; text-align: center; }
        #attendanceListView { display: none; }
        
        .unit-card { 
            background: rgba(26, 26, 26, 0.85); 
            backdrop-filter: blur(5px);
            padding: 15px; margin: 10px 0; border-radius: 15px; 
            display: flex; justify-content: space-between; align-items: center; 
            border-left: 6px solid var(--brand-blue); 
        }
        
        .status-text { min-width: 80px; text-align: right; font-weight: 700; font-size: 11px; text-transform: uppercase; }
        .status-present { color: var(--brand-teal); }
        .status-absent { color: var(--brand-coral); }
        .btn-mark { padding: 8px 12px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; color: white; }

        #passwordModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; }
        .modal-box { background: #1a1a1a; padding: 30px; border-radius: 20px; width: 90%; max-width: 350px; text-align: center; border: 2px solid var(--brand-purple); }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo-container" onclick="showPage('landingPage')">
            <span class="logo-kerala">SDC</span><span class="logo-sahityotsav">CHETTIYANKINAR</span>
        </div>
    </nav>

    <section id="landingPage" class="page active-page">
        <div class="hero">
            <div class="kerala-label">Official Portal</div>
            <h1 class="sahityotsav-title">SDC<br>CHETTIYANKINAR</h1>
            <button class="btn-3d btn-attendance" onclick="showPage('attendancePage')">Attendance Panel</button>
        </div>
    </section>

    <section id="attendancePage" class="page">
        <div style="max-width: 600px; margin: 0 auto;">
            <div id="venueSelectionView">
                <button onclick="showPage('landingPage')" style="background: #2f2f2f; border: none; color: white; padding: 10px 20px; border-radius: 20px; cursor: pointer; margin-bottom: 25px; font-weight: 600;">← BACK</button>
                <h1 style="color:var(--brand-blue); font-family:'Fredoka'; margin-bottom:15px; font-weight: 500;">Attendance Panel</h1>
                <select id="venueSelect" onchange="openPasswordModal()" style="width:100%; padding:15px; background:var(--brand-yellow); color:black; border-radius:15px; border:1px solid #1597b1; outline:none; font-weight: bold;">
                    <option value="">-- SELECT VENUE --</option>
                    <option value="GRAPHIC DESIGN">GRAPHIC DESIGN</option>
                    <option value="CLOUD COMPUTING">CLOUD COMPUTING</option>
                </select>
            </div>

            <div id="attendanceListView">
                <button onclick="backToVenues()" style="background: #1a1a1a; border: none; color: var(--brand-blue); padding: 10px 20px; border-radius: 20px; cursor: pointer; margin-bottom: 25px; font-weight: 600;">← CHANGE VENUE</button>
                <h2 id="currentVenueTitle" style="color:var(--brand-peach); font-family:'Fredoka'; margin-bottom:10px; font-weight: 500;"></h2>
                <div id="unitsContainer"></div>
                <div id="summary" style="text-align:center; margin-top:20px; padding:15px; background:rgba(0,0,0,0.8); border-radius:15px; font-weight:600; border:1px dashed #333;"></div>
                <button onclick="clearAttendance()" style="background:none; border:none; color:#555; font-size:10px; margin-top:20px; cursor:pointer;">Reset Local Data</button>
            </div>
        </div>
    </section>

    <div id="passwordModal">
        <div class="modal-box">
            <h3 style="color:var(--brand-purple);">🔒 PIN REQUIRED</h3>
            <p style="font-size:14px; margin:10px 0; color:var(--brand-yellow);">Venue: <span id="vName" style="font-weight: 700; color: var(--brand-peach);"></span></p>
            <input type="password" id="passInput" style="width:100%; padding:12px; background:#000; border:1px solid #333; color:white; border-radius:10px; text-align:center; outline:none;">
            <button class="btn-3d" style="background:var(--brand-purple); width:100%; margin-top:15px; padding:12px; box-shadow:0px 5px 0px #8e5474;" onclick="verifyPassword()">UNLOCK & ENTER</button>
            <button onclick="closeModal()" style="background:none; border:none; color:#777; margin-top:10px; cursor:pointer; font-weight: 500;">← Back to Selection</button>
        </div>
    </div>

    <script>
        // Configuration
        const PASSWORDS = { "GRAPHIC DESIGN": "1111", "CLOUD COMPUTING": "2222" };
        const UNITS = ["ADRSHERI NORTH", "ADRSHERI", "STAGE PADI", "PONMUNDAM", "NARALA", "KULANGARA", "VEERASHERI PADI", "PARAMMAL", "MANNARAKKUNN", "PRAMBILPEEDIKA"];

        let selectedVenue = ""; 

        // Local Storage Management
        const getLocalData = () => JSON.parse(localStorage.getItem('sdc_attendance')) || {};
        const setLocalData = (data) => localStorage.setItem('sdc_attendance', JSON.stringify(data));

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(id).classList.add('active-page');
            if(id !== 'attendancePage') backToVenues();
        }

        function openPasswordModal() {
            selectedVenue = document.getElementById("venueSelect").value;
            if(!selectedVenue) return;
            document.getElementById("vName").innerText = selectedVenue.toUpperCase();
            document.getElementById("passwordModal").style.display = "flex";
            document.getElementById("passInput").focus();
        }

        function closeModal() {
            document.getElementById("passwordModal").style.display = "none";
            document.getElementById("venueSelect").value = "";
            document.getElementById("passInput").value = "";
        }

        function verifyPassword() {
            if(document.getElementById("passInput").value === PASSWORDS[selectedVenue]) {
                document.getElementById("passwordModal").style.display = "none";
                document.getElementById("passInput").value = "";
                document.getElementById("venueSelectionView").style.display = "none";
                document.getElementById("attendanceListView").style.display = "block";
                document.getElementById("currentVenueTitle").innerText = selectedVenue;
                renderAttendance();
            } else { 
                alert("WRONG PIN!"); 
            }
        }

        function backToVenues() {
            document.getElementById("venueSelectionView").style.display = "block";
            document.getElementById("attendanceListView").style.display = "none";
            document.getElementById("venueSelect").value = "";
        }

        function renderAttendance() {
            const data = getLocalData();
            let html = "", pCount = 0, aCount = 0;
            
            UNITS.forEach((name, i) => {
                const key = `${selectedVenue}_Unit${i+1}`;
                const status = data[key] ? data[key].status : "";
                
                if(status === "Present") pCount++; 
                else if(status === "Absent") aCount++;

                html += `
                    <div class="unit-card">
                        <div style="flex:1;"><strong>${name}</strong></div>
                        <div style="display:flex; gap:10px; align-items:center;">
                            <button class="btn-mark" style="background:var(--brand-teal)" onclick="markStatus('${i+1}','Present')" ${status ? 'disabled' : ''}>✓</button>
                            <button class="btn-mark" style="background:var(--brand-coral)" onclick="markStatus('${i+1}','Absent')" ${status ? 'disabled' : ''}>✗</button>
                            <span class="status-text ${status === 'Present' ? 'status-present' : 'status-absent'}">${status}</span>
                        </div>
                    </div>`;
            });

            document.getElementById("unitsContainer").innerHTML = html;
            document.getElementById("summary").innerHTML = `<span style="color:var(--brand-teal)">PRESENT: ${pCount}</span> | <span style="color:var(--brand-coral)">ABSENT: ${aCount}</span>`;
        }

        function markStatus(unitIndex, status) {
            const data = getLocalData();
            const key = `${selectedVenue}_Unit${unitIndex}`;
            data[key] = {
                venue: selectedVenue,
                unit: unitIndex,
                name: UNITS[unitIndex-1],
                status: status
            };
            setLocalData(data);
            renderAttendance();
        }

        function clearAttendance() {
            if(confirm("This will clear all attendance data on this device. Continue?")) {
                localStorage.removeItem('sdc_attendance');
                renderAttendance();
            }
        }
    </script>
</body>
</html>
